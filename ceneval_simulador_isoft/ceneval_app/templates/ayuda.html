<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ayuda — Evalúa+</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="app-shell">

  {% set active = 'ayuda' %}
  {% include '_sidebar.html' %}

  <div class="main-content">
    <header class="topbar">
      <div class="topbar-progress-info">
        <svg viewBox="0 0 24 24" width="15" height="15" stroke="currentColor" fill="none" stroke-width="1.8">
          <circle cx="12" cy="12" r="10"/>
          <path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
        Ayuda
      </div>
    </header>

    <div class="temas-page">
      <div style="text-align:center; padding: 80px 20px;">
        <div style="width:64px;height:64px;border-radius:50%;background:var(--surface);border:1px solid var(--border);
                    display:flex;align-items:center;justify-content:center;margin:0 auto 20px;">
          <svg viewBox="0 0 24 24" width="26" height="26" stroke="var(--text-3)" fill="none" stroke-width="1.75">
            <circle cx="12" cy="12" r="10"/>
            <path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/>
            <line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
        </div>
        <div style="font-size:1.1rem;font-weight:700;color:var(--text-1);margin-bottom:8px;">
          ¿Necesitas ayuda?
        </div>
        <div style="font-size:0.95rem;color:var(--text-3);max-width:340px;margin:0 auto;line-height:1.65;">
          Llama a tu profesora.
        </div>
      </div>
    </div>

  </div>
</div>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
