<!-- _sidebar.html — incluido en cada template -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark">
      <svg viewBox="0 0 20 20">
        <path d="M10 2L3 7v6l7 5 7-5V7L10 2z" />
        <path d="M10 12l-3-2 3-2 3 2-3 2z" fill="white" opacity=".6" />
      </svg>
    </div>
    <div>
      <div class="logo-title">Evalúa<span>+</span></div>
      <div class="logo-sub">Plataforma de Examen Inteligente</div>
    </div>
  </div>

  <nav class="sidebar-nav">
    {% if not session.get('estudiante') %}
    <a href="{{ url_for('index') }}" class="nav-item {% if active == 'inicio' %}active{% endif %}">
      <svg viewBox="0 0 24 24">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
        <polyline points="9 22 9 12 15 12 15 22" />
      </svg>
      Inicio
    </a>
    {% endif %}
    <a href="{{ url_for('temas') if session.get('estudiante') else url_for('index') }}"
      class="nav-item {% if active == 'temas' %}active{% endif %}">
      <svg viewBox="0 0 24 24">
        <path d="M4 19.5A2.5 2.5 0 016.5 17H20" />
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z" />
      </svg>
      Temas
    </a>
    <a href="{{ url_for('examen') if session.get('ronda') else '#' }}"
      class="nav-item {% if active == 'examen' %}active{% endif %}">
      <svg viewBox="0 0 24 24">
        <rect x="3" y="3" width="18" height="18" rx="2" />
        <line x1="9" y1="9" x2="15" y2="9" />
        <line x1="9" y1="12" x2="15" y2="12" />
        <line x1="9" y1="15" x2="12" y2="15" />
      </svg>
      Examen
    </a>
    <a href="{{ url_for('final') if session.get('examen') else '#' }}"
      class="nav-item {% if active == 'resultados' %}active{% endif %}">
      <svg viewBox="0 0 24 24">
        <line x1="18" y1="20" x2="18" y2="10" />
        <line x1="12" y1="20" x2="12" y2="4" />
        <line x1="6" y1="20" x2="6" y2="14" />
      </svg>
      Resultados
    </a>
    <a href="{{ url_for('retroalimentacion') if session.get('estudiante') else '#' }}"
      class="nav-item {% if active == 'retroalimentacion' %}active{% endif %}">
      <svg viewBox="0 0 24 24">
        <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" />
      </svg>
      Retroalimentación
    </a>
  </nav>

  <div class="sidebar-footer">
    <a href="{{ url_for('ayuda') if session.get('estudiante') else '#' }}"
      class="nav-item {% if active == 'ayuda' %}active{% endif %}">
      <svg viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10" />
        <path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3" />
        <line x1="12" y1="17" x2="12.01" y2="17" />
      </svg>
      Ayuda
    </a>
    <a href="{{ url_for('reiniciar') }}" class="nav-item" onclick="return confirm('¿Cerrar sesión y reiniciar?')">
      <svg viewBox="0 0 24 24">
        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" />
        <polyline points="16 17 21 12 16 7" />
        <line x1="21" y1="12" x2="9" y2="12" />
      </svg>
      Cerrar sesión
    </a>
  </div>
</aside>
